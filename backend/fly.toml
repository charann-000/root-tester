app = "metatron"
primary_region = "ord"

[build]
  image = "python:3.11-slim"

[deploy]
  release_command = "python -c 'from db import init_db; init_db()'"

[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8000"

[[services]]
  name = "metatron"
  internal_port = 8000
  protocol = "tcp"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[env]
  DB_TYPE = "postgresql"