app = "metatron"
primary_region = "ord"

[build]
  builder = "paketobuildpacks/base"
  buildpacks = ["paketo-buildpacks/python"]

[buildpacks]
  python = "paketo-buildpacks/python"

[[services]]
  name = "metatron"
  http_checks = []
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.expenses]]
    url = "fly.toml:run"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[deploy]
  release_command = "python -c 'from db import init_db; init_db()'"

[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8000"

[env]
  DB_TYPE = "postgresql"
  LLM_PROVIDER = "groq"

[[statics]]
  guest_paths = ["/home/vcap/app/static"]

[[statics]]
  guest_paths = ["/home/vcap/app/public"]

[database]
  postgres = {}